name = "binance-ai-bot"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# dashboard.html'i metin modülü olarak paketle (worker.js içine import edebilmek için)
[[rules]]
type = "Text"
globs = ["**/*.html"]

[triggers]
crons = ["*/3 * * * *"]

[[kv_namespaces]]
binding = "BOT_KV"
id = "5dfa25a51b6443a3a337bf5fbe6b53bb"

# Secrets — Cloudflare Dashboard > Workers > binance-ai-bot > Settings > Variables altına ekle:
# BINANCE_API_KEY
# BINANCE_SECRET
# GEMINI_API_KEY
# GROQ_API_KEY
